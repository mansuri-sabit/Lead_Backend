services:
  - type: web
    name: facebook-backend
    runtime: docker
    region: singapore
    plan: standard            # Playwright + OCR need ~2GB RAM; free/starter will OOM
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false           # paste your MongoDB Atlas SRV string in the dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false           # your deployed frontend origin (used for CORS)
